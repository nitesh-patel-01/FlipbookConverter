<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#d9a441" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0e0c0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#d9a441" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0c0a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0e0c0a"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="rgba(217,164,65,0.1)" stroke="rgba(239,231,215,0.14)"/>
    <path d="M30 14v32M14 20h14a6 6 0 0 1 6 6v20M46 20h-14a6 6 0 0 0-6 6v20"
          fill="none" stroke="#d9a441" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="42" font-family="Georgia, serif" font-size="24" fill="#efe7d7" letter-spacing="1">
      Flipbook <tspan fill="#a89f8e" font-style="italic">Converter</tspan>
    </text>
  </g>

  <!-- Headline -->
  <text x="80" y="320" font-family="Georgia, serif" font-size="96" fill="#efe7d7" letter-spacing="-2">
    Turn PDFs into
  </text>
  <text x="80" y="430" font-family="Georgia, serif" font-size="96" fill="#efe7d7" letter-spacing="-2">
    <tspan font-style="italic" fill="#d9a441">interactive</tspan> flipbooks.
  </text>

  <!-- Sub -->
  <text x="80" y="510" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#a89f8e">
    Upload · Preview · Download a portable HTML bundle
  </text>

  <!-- Corner stamp -->
  <text x="1120" y="580" font-family="Helvetica, Arial, sans-serif" font-size="20"
        fill="#6f685b" text-anchor="end" letter-spacing="3">
